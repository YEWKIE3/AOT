<!DOCTYPE html>
<html>
<head>
  <title>AOT Survival</title>
  <style>
    body { margin:0; overflow:hidden; background:#1e1e2f; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------- STATE ----------
let gameState = "menu";

// ---------- CHARACTERS ----------
let characters = [
 {name:"Eren",color:"green",speed:5,health:3},
 {name:"Mikasa",color:"red",speed:7,health:2},
 {name:"Armin",color:"yellow",speed:4,health:3},
 {name:"Levi",color:"purple",speed:6,health:2},
 {name:"Reiner",color:"orange",speed:3,health:5},
 {name:"Annie",color:"pink",speed:5,health:3}
];

let selectedCharacter = 0;

// ---------- PLAYER ----------
let player;

// ---------- TITANS ----------
let titans=[];

// ---------- CONTROLS ----------
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(gameState==="menu"){
    if(e.key==="ArrowLeft") selectedCharacter--;
    if(e.key==="ArrowRight") selectedCharacter++;

    if(selectedCharacter<0) selectedCharacter=characters.length-1;
    if(selectedCharacter>=characters.length) selectedCharacter=0;

    if(e.key==="Enter") startGame();
  }

  if(gameState==="gameover" && e.key==="Enter"){
    gameState="menu";
  }
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// ---------- START ----------
function startGame(){
  let c = characters[selectedCharacter];

  player = {
    x:canvas.width/2,
    y:canvas.height/2,
    speed:c.speed,
    health:c.health,
    color:c.color,
    frame:0,
    frameTick:0
  };

  titans=[];
  spawnWave();

  gameState="playing";
}

// ---------- SPAWN ----------
function spawnWave(){
  for(let i=0;i<5;i++){
    titans.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:1+Math.random()
    });
  }
}

// ---------- UPDATE ----------
function update(){
  let moving = false;

  if(keys["w"]){ player.y-=player.speed; moving=true; }
  if(keys["s"]){ player.y+=player.speed; moving=true; }
  if(keys["a"]){ player.x-=player.speed; moving=true; }
  if(keys["d"]){ player.x+=player.speed; moving=true; }

  // animation
  player.frameTick++;
  if(player.frameTick > 10){
    player.frame = (player.frame + 1) % 2;
    player.frameTick = 0;
  }

  titans.forEach((t,i)=>{
    let dx=player.x-t.x;
    let dy=player.y-t.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;

    if(dist < 40){
      player.health--;
      titans.splice(i,1);

      if(player.health<=0){
        gameState="gameover";
      }
    }
  });

  if(titans.length===0) spawnWave();
}

// ---------- PIXEL CHARACTER ----------
function drawCharacter(x,y,color,frame){
  ctx.fillStyle=color;

  // body
  ctx.fillRect(x, y, 20, 30);

  // head
  ctx.fillStyle="white";
  ctx.fillRect(x+4, y-10, 12, 10);

  // legs animation
  ctx.fillStyle=color;
  if(frame === 0){
    ctx.fillRect(x, y+30, 6, 10);
    ctx.fillRect(x+14, y+30, 6, 10);
  } else {
    ctx.fillRect(x+4, y+30, 6, 10);
    ctx.fillRect(x+10, y+30, 6, 10);
  }
}

// ---------- MENU ----------
function drawMenu(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let startX = canvas.width/2 - (characters.length * 100)/2;

  characters.forEach((c,i)=>{
    let x = startX + i*100;
    let y = canvas.height/2;

    drawCharacter(x-10,y-10,c.color,0);

    if(i===selectedCharacter){
      ctx.strokeStyle="yellow";
      ctx.strokeRect(x-20,y-20,40,60);
    }

    ctx.fillStyle="white";
    ctx.fillText(c.name,x,y+50);
  });
}

// ---------- DRAW ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawCharacter(player.x, player.y, player.color, player.frame);

  // titans
  titans.forEach(t=>{
    ctx.fillStyle="red";
    ctx.fillRect(t.x,t.y,30,50);
  });

  ctx.fillStyle="white";
  ctx.fillText("HP: "+player.health,20,20);
}

// ---------- GAME OVER ----------
function drawGameOver(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.font="40px Arial";
  ctx.textAlign="center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
}

// ---------- LOOP ----------
function gameLoop(){
  if(gameState==="menu") drawMenu();
  else if(gameState==="playing"){ update(); draw(); }
  else if(gameState==="gameover") drawGameOver();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
