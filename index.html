<!DOCTYPE html>
<html>
<head>
  <title>AOT Survival</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.font = "20px Arial";
ctx.textAlign = "center";

// ---------- IMAGE ----------
let sprite = new Image();
let spriteReady = false;
let frameWidth = 0;
let frameHeight = 0;

sprite.onload = () => {
  spriteReady = true;
  frameWidth = sprite.width / 3;
  frameHeight = sprite.height / 2;
  gameState = "menu";
};

sprite.src = "./sprites.png";

// ---------- STATE ----------
let gameState = "loading";

// ---------- CHARACTERS ----------
let characters = ["Eren","Mikasa","Armin","Levi","Reiner","Annie"];
let selectedCharacter = 0;

// ---------- PLAYER ----------
let player = null;

// ---------- TITANS ----------
let titans = [];

// ---------- INPUT ----------
let keys = {};

document.addEventListener("keydown", e=>{
  keys[e.key] = true;

  if(gameState==="menu"){
    if(e.key==="ArrowLeft") selectedCharacter--;
    if(e.key==="ArrowRight") selectedCharacter++;

    if(selectedCharacter<0) selectedCharacter=characters.length-1;
    if(selectedCharacter>=characters.length) selectedCharacter=0;

    if(e.key==="Enter") startGame();
  }

  if(gameState==="playing" && e.key===" "){
    if(player){
      player.attacking = true;
      player.attackTimer = 10;
    }
  }

  if(gameState==="gameover" && e.key==="Enter"){
    gameState="menu";
  }
});

document.addEventListener("keyup", e=> keys[e.key]=false);

// ---------- START ----------
function startGame(){
  player = {
    x:canvas.width/2,
    y:canvas.height/2,
    health:3,
    index:selectedCharacter,
    facing:1,
    attacking:false,
    attackTimer:0
  };

  titans = [];
  spawnWave();
  gameState="playing";
}

// ---------- SPAWN ----------
function spawnWave(){
  for(let i=0;i<5;i++){
    titans.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:1+Math.random()
    });
  }
}

// ---------- UPDATE ----------
function update(){
  if(!player) return;

  if(keys["w"]) player.y-=5;
  if(keys["s"]) player.y+=5;

  if(keys["a"]){
    player.x -= 5;
    player.facing = -1;
  }

  if(keys["d"]){
    player.x += 5;
    player.facing = 1;
  }

  // attack
  if(player.attacking){
    player.attackTimer--;

    for(let i=titans.length-1;i>=0;i--){
      let t = titans[i];
      let dx=player.x-t.x;
      let dy=player.y-t.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<80) titans.splice(i,1);
    }

    if(player.attackTimer<=0) player.attacking=false;
  }

  // titan movement
  for(let i=titans.length-1;i>=0;i--){
    let t = titans[i];
    let dx=player.x-t.x;
    let dy=player.y-t.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;

    if(dist<40){
      player.health--;
      titans.splice(i,1);

      if(player.health<=0){
        gameState="gameover";
      }
    }
  }

  if(titans.length===0) spawnWave();
}

// ---------- SPRITE ----------
function getSprite(index){
  let col = index % 3;
  let row = Math.floor(index / 3);

  return {
    sx: col * frameWidth,
    sy: row * frameHeight
  };
}

// ---------- DRAW PLAYER (FIXED FLIP) ----------
function drawPlayer(){
  if(!player || !spriteReady) return;

  let pos = getSprite(player.index);

  ctx.save();

  // move to center
  ctx.translate(player.x + 32, player.y + 32);

  // flip correctly
  ctx.scale(player.facing, 1);

  ctx.drawImage(
    sprite,
    pos.sx, pos.sy,
    frameWidth, frameHeight,
    -32, -32,
    64, 64
  );

  ctx.restore();

  // blade animation
  if(player.attacking){
    ctx.save();
    ctx.translate(player.x+32, player.y+32);

    let angle = (10 - player.attackTimer) * 0.4 * player.facing;
    ctx.rotate(angle);

    ctx.fillStyle="white";
    ctx.fillRect(0,-4,55,8);

    ctx.restore();
  }
}

// ---------- MENU ----------
function drawMenu(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.fillText("SELECT CHARACTER", canvas.width/2,100);

  let startX = canvas.width/2 - (characters.length * 100)/2;

  for(let i=0;i<characters.length;i++){
    let x=startX+i*100;
    let y=canvas.height/2;

    if(spriteReady){
      let pos=getSprite(i);
      ctx.drawImage(sprite,pos.sx,pos.sy,frameWidth,frameHeight,x-32,y-32,64,64);
    }

    if(i===selectedCharacter){
      ctx.strokeStyle="yellow";
      ctx.strokeRect(x-40,y-40,80,80);
    }

    ctx.fillStyle="white";
    ctx.fillText(characters[i],x,y+60);
  }
}

// ---------- DRAW ----------
function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawPlayer();

  // titans
  ctx.fillStyle="red";
  for(let t of titans){
    ctx.fillRect(t.x,t.y,40,60);
  }

  if(player){
    ctx.fillStyle="white";
    ctx.fillText("HP: "+player.health,60,30);
  }
}

// ---------- GAME OVER ----------
function drawGameOver(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2);
}

// ---------- LOOP ----------
function loop(){
  if(gameState==="loading"){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    ctx.fillText("LOADING...",canvas.width/2,canvas.height/2);
  }
  else if(gameState==="menu") drawMenu();
  else if(gameState==="playing"){ update(); draw(); }
  else if(gameState==="gameover") drawGameOver();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
