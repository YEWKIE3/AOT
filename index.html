<!DOCTYPE html>
<html>
<head>
  <title>Titan Survival Brawl</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap'); /* placeholder for DItTy font */

    body { margin: 0; overflow: hidden; background: #1e1e2f; font-family: 'Press Start 2P', monospace; }
    canvas { display: block; background: #87CEEB; }
    #ui { position: absolute; top: 0; left: 0; color: white; font-size: 20px; padding: 10px; }
    button { font-family: 'Press Start 2P', monospace; font-size: 14px; padding: 5px; margin: 5px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui"></div>

  <script>
    // ----- Canvas -----
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const ui = document.getElementById("ui");

    // ----- Game States -----
    let gameState = "loading"; // loading, menu, playing, gameover

    // ----- Player -----
    let player = { x: 0, y: 0, size: 30, speed: 5, health: 3, coins: 0, width: 30, height:30 };

    // ----- Controls -----
    let keys = {};
    document.addEventListener("keydown", e => keys[e.key] = true);
    document.addEventListener("keyup", e => keys[e.key] = false);

    // ----- Hitboxes -----
    function rectCollision(a, b){
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function circleCollision(x1,y1,r1,x2,y2,r2){
      let dx=x1-x2;
      let dy=y1-y2;
      return Math.sqrt(dx*dx + dy*dy) < r1+r2;
    }

    // ----- Loading Screen -----
    let loadingTimer=0;
    function drawLoading(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="white";
      ctx.font="50px 'Press Start 2P'";
      ctx.textAlign="center";
      ctx.fillText("LOADING", canvas.width/2, canvas.height/2 -50);
      ctx.fillText("...", canvas.width/2, canvas.height/2);

      loadingTimer++;
      if(loadingTimer>120) gameState="menu"; // move to menu after 2 seconds
    }

    // ----- Character Select -----
    let selectedCharacter = 0;
    const characters = ["Char1","Char2","Char3","Char4"];
    function drawMenu(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="white";
      ctx.font="40px 'Press Start 2P'";
      ctx.textAlign="center";
      ctx.fillText("SELECT CHARACTER", canvas.width/2, 100);

      const startX = canvas.width/2 - (characters.length*120)/2;
      const y = canvas.height/2;
      characters.forEach((char,i)=>{
        const x = startX + i*120;
        ctx.fillStyle = i===selectedCharacter ? "yellow":"white";
        ctx.fillRect(x-50,y-50,100,100);
        ctx.fillStyle="black";
        ctx.fillText(char, x, y+80);
      });

      ctx.font="20px 'Press Start 2P'";
      ctx.fillStyle="white";
      ctx.fillText("Use LEFT/RIGHT arrows and ENTER to start", canvas.width/2, canvas.height-100);
    }

    document.addEventListener("keydown", e=>{
      if(gameState==="menu"){
        if(e.key==="ArrowLeft") selectedCharacter = (selectedCharacter-1+characters.length)%characters.length;
        if(e.key==="ArrowRight") selectedCharacter = (selectedCharacter+1)%characters.length;
        if(e.key==="Enter") startGame();
      }
    });

    function startGame(){
      gameState="playing";
      player.x = canvas.width/2;
      player.y = canvas.height/2;
      player.health=3;
      player.coins=0;
      waveNumber=1;
      titans=[];
      spawnWave(waveNumber);
    }

    // ----- Titans / Waves -----
    let titans = [];
    let waveNumber = 1;

    function spawnWave(wave){
      for(let i=0;i<wave+3;i++){
        titans.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          width: 60,
          height: 100,
          speed: 1 + Math.random(),
          health: 2
        });
      }
    }

    // ----- Attacks -----
    let attacking=false;
    let attackTimer=0;
    document.addEventListener("keydown", e=>{
      if(gameState==="playing" && e.key===" "){
        attacking=true;
        attackTimer=10;
      }
    });

    function checkAttacks(){
      titans.forEach((t)=>{
        const neckX = t.x + t.width/2;
        const neckY = t.y + 20;
        if(attacking && circleCollision(player.x+player.size/2, player.y+player.size/2, 40, neckX, neckY, 15)){
          t.health--;
          if(t.health<=0){
            titans.splice(titans.indexOf(t),1);
            player.coins++;
          }
        }
      });
    }

    // ----- Update -----
    function update(){
      // Player movement
      if(keys["w"]) player.y-=player.speed;
      if(keys["s"]) player.y+=player.speed;
      if(keys["a"]) player.x-=player.speed;
      if(keys["d"]) player.x+=player.speed;

      // Titans move toward player
      titans.forEach((t)=>{
        const dx = player.x - t.x;
        const dy = player.y - t.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        t.x += (dx/dist)*t.speed;
        t.y += (dy/dist)*t.speed;

        // collision with player
        if(rectCollision(player, t)){
          player.health--;
          t.x=Math.random()*canvas.width;
          t.y=Math.random()*canvas.height;
          if(player.health<=0) gameState="gameover";
        }
      });

      if(attacking){
        attackTimer--;
        if(attackTimer<=0) attacking=false;
      }

      checkAttacks();

      // Spawn next wave
      if(titans.length===0){
        waveNumber++;
        spawnWave(waveNumber);
      }
    }

    // ----- Draw -----
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Player
      ctx.fillStyle="black";
      ctx.fillRect(player.x, player.y, player.size, player.size);

      // Titans
      titans.forEach((t)=>{
        ctx.fillStyle="red";
        ctx.fillRect(t.x, t.y, t.width, t.height);
        ctx.fillStyle="yellow";
        ctx.fillRect(t.x + t.width/2 -5, t.y+20, 10, 10);
      });

      // Slash effect
      if(attacking){
        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.arc(player.x+player.size/2, player.y+player.size/2, 40,0,Math.PI*2);
        ctx.stroke();
      }

      // Player health
      ctx.fillStyle="green";
      for(let i=0;i<player.health;i++){
        ctx.fillRect(20+i*25,20,20,20);
      }

      // Coins & Wave
      ctx.fillStyle="gold";
      ctx.fillText("Coins: "+player.coins, 20, 70);
      ctx.fillStyle="white";
      ctx.fillText("Wave: "+waveNumber, 20, 100);
    }

    // ----- Game Over -----
    function drawGameOver(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="red";
      ctx.font="60px 'Press Start 2P'";
      ctx.textAlign="center";
      ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2-50);
      ctx.font="30px 'Press Start 2P'";
      ctx.fillText("Coins Collected: "+player.coins, canvas.width/2, canvas.height/2+20);
      ctx.fillText("Press ENTER to Restart", canvas.width/2, canvas.height/2+70);
    }

    document.addEventListener("keydown", e=>{
      if(gameState==="gameover" && e.key==="Enter") startGame();
    });

    // ----- Main loop -----
    function gameLoop(){
      if(gameState==="loading") drawLoading();
      else if(gameState==="menu") drawMenu();
      else if(gameState==="playing"){ update(); draw(); }
      else if(gameState==="gameover") drawGameOver();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
