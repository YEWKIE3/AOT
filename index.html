<!DOCTYPE html>
<html>
<head>
  <title>AOT Pixel Survival</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; background:#111; }
    #ui {
      position:absolute; top:10px; left:10px; color:white;
      font-family:sans-serif; font-size:20px;
    }
  </style>
</head>
<body>

<div id="ui">HP: 3 | Score: 0 | Wave: 1 | Power: None</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Game State ---
let gameState = "menu";
let characters = ["Eren","Mikasa","Armin","Levi","Reiner","Annie"];
let selectedCharacter = 0;
let player = null;
let titans = [];
let keys = {};
let score=0, wave=1, powerUp=null;
let shake=0;
let powerUps=[];

// --- Input ---
document.addEventListener("keydown", e=>{
  keys[e.key]=true;
  if(gameState==="menu"){
    if(e.key==="ArrowLeft") selectedCharacter=(selectedCharacter-1+characters.length)%characters.length;
    if(e.key==="ArrowRight") selectedCharacter=(selectedCharacter+1)%characters.length;
    if(e.key==="Enter") startGame();
  }
  if(gameState==="playing"){
    if(e.key===" ") attack();
    if(e.key==="Shift") dash();
  }
  if(gameState==="gameover" && e.key==="Enter"){ gameState="menu"; score=0; wave=1; }
});
document.addEventListener("keyup", e=> keys[e.key]=false);

// --- Player ---
function startGame(){
  player={
    x:canvas.width/2, y:canvas.height/2,
    health:3, index:selectedCharacter,
    attacking:false, attackTimer:0, combo:0,
    dashing:false, dashTimer:0,
    animFrame:0, animTimer:0,
    power:null, powerTimer:0
  };
  titans=[];
  spawnWave();
  gameState="playing";
}

function attack(){ if(player&&!player.attacking){ player.attacking=true; player.attackTimer=12; player.combo=(player.combo+1)%3; } }
function dash(){ if(player&&!player.dashing){ player.dashing=true; player.dashTimer=12; } }

// --- Titans ---
function spawnWave(){
  wave++;
  for(let i=0;i<3+wave;i++){
    const size=Math.random()*40+30;
    titans.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:1+Math.random()*wave*0.3,
      size:size, animFrame:0, animTimer:0,
      boss: wave%5===0 && i===0
    });
  }
}

// --- Update ---
function update(){
  if(!player) return;

  // Movement
  const speed = player.dashing?10:5;
  if(keys["w"]) player.y-=speed;
  if(keys["s"]) player.y+=speed;
  if(keys["a"]) player.x-=speed;
  if(keys["d"]) player.x+=speed;

  if(player.dashing){ player.dashTimer--; if(player.dashTimer<=0) player.dashing=false; }

  if(player.attacking){
    player.attackTimer--;
    titans.forEach((t,i)=>{
      const dx=player.x-t.x, dy=player.y-t.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<t.size+40){ titans.splice(i,1); score+= t.boss?50:10; screenShake(); spawnPowerUp(t.x,t.y); }
    });
    if(player.attackTimer<=0) player.attacking=false;
  }

  titans.forEach(t=>{
    const dx=player.x-t.x, dy=player.y-t.y, dist=Math.sqrt(dx*dx+dy*dy);
    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;
    if(dist<t.size+20){ player.health--; titans.splice(titans.indexOf(t),1); screenShake(); if(player.health<=0) gameState="gameover"; }
  });

  // Animations
  player.animTimer++; if(player.animTimer>5){ player.animFrame=(player.animFrame+1)%4; player.animTimer=0; }
  titans.forEach(t=>{ t.animTimer++; if(t.animTimer>10){ t.animFrame=(t.animFrame+1)%2; t.animTimer=0; } });

  // Power-ups
  powerUps.forEach((p,i)=>{
    const dx=p.x-player.x, dy=p.y-player.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<40){ player.power=p.type; player.powerTimer=600; if(p.type==="Health") player.health=Math.min(player.health+1,5); powerUps.splice(i,1); }
    p.timer--; if(p.timer<=0) powerUps.splice(i,1);
  });

  if(titans.length===0) spawnWave();
  updateUI();
}

// --- Power-ups ---
function spawnPowerUp(x,y){
  const types=["Health","Speed","Attack"];
  const p={x,y,type:types[Math.floor(Math.random()*types.length)],timer:600};
  powerUps.push(p);
}

// --- UI ---
function updateUI(){ document.getElementById("ui").innerText=`HP: ${player.health} | Score: ${score} | Wave: ${wave} | Power: ${player.power||"None"}`; }

// --- Effects ---
function screenShake(){ shake=8; }

// --- Draw ---
function draw(){
  ctx.save();
  if(shake){ ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake--; }

  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Power-ups
  powerUps.forEach(p=>{
    ctx.fillStyle=p.type==="Health"?"green":p.type==="Speed"?"blue":"orange";
    ctx.fillRect(p.x-10,p.y-10,20,20);
  });

  // Titans
  titans.forEach(t=>{
    ctx.fillStyle=t.boss?"darkred":"red";
    ctx.beginPath();
    ctx.ellipse(t.x,t.y,t.size/2,t.size,0,0,Math.PI*2);
    ctx.fill();
  });

  // Player
  ctx.save();
  ctx.translate(player.x,player.y);
  let angle=0;
  if(player.attacking) angle=Math.sin(player.attackTimer/2)*0.5;
  if(player.dashing) angle+=0.2;
  ctx.rotate(angle);

  // Body
  ctx.fillStyle="cyan"; ctx.fillRect(-10,-16,20,32);
  // Head
  ctx.fillStyle="white"; ctx.fillRect(-6,-24,12,8);
  // Blades (attack)
  if(player.attacking){
    ctx.fillStyle="yellow";
    ctx.fillRect(10,-4,20,4);
    ctx.fillRect(-30,-4,20,4);
  }
  ctx.restore();

  // Dash effect
  if(player.dashing){
    ctx.strokeStyle="white";
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(player.x,player.y);
      ctx.lineTo(player.x+Math.random()*100-50, player.y+Math.random()*100-50);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// --- Menu ---
function drawMenu(){
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white"; ctx.textAlign="center"; ctx.font="40px sans-serif";
  ctx.fillText("SELECT CHARACTER", canvas.width/2,100);
  const startX=canvas.width/2-(characters.length*100)/2;
  characters.forEach((c,i)=>{
    const x=startX+i*100, y=canvas.height/2;
    ctx.fillStyle=i===selectedCharacter?"yellow":"white";
    ctx.fillRect(x-16,y-32,32,32);
    ctx.fillStyle="white";
    ctx.fillText(c,x,y+40);
  });
}

// --- Game Over ---
function drawGameOver(){
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="red"; ctx.textAlign="center"; ctx.font="60px sans-serif";
  ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2);
}

// --- Loop ---
function loop(){
  if(gameState==="menu") drawMenu();
  else if(gameState==="playing"){ update(); draw(); }
  else if(gameState==="gameover") drawGameOver();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
