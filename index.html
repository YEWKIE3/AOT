<!DOCTYPE html>
<html>
<head>
  <title>Titan Survival</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap'); /* placeholder for DItTy font */

    body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Press Start 2P', monospace; }
    canvas { display: block; background: skyblue; }
    #ui { position: absolute; top: 0; left: 0; color: white; font-size: 20px; padding: 10px; }
    button { font-family: 'Press Start 2P', monospace; font-size: 14px; padding: 5px; margin: 5px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui"></div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let ui = document.getElementById("ui");

    // ----- Game states -----
    let gameState = "loading"; // loading, menu, playing, gameover

    // ----- Loading -----
    let loadingTimer = 0;
    function drawLoading() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "black";
      ctx.font = "50px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.fillText("LOADING...", canvas.width/2, canvas.height/2);
      loadingTimer++;
      if(loadingTimer > 100) gameState = "menu"; // move to menu after some frames
    }

    // ----- Menu / Character Select -----
    let selectedCharacter = 0;
    let characters = ["Character 1","Character 2","Character 3"];
    function drawMenu() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "black";
      ctx.font = "40px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.fillText("SELECT CHARACTER", canvas.width/2, 100);

      characters.forEach((char,i)=>{
        ctx.fillStyle = i===selectedCharacter ? "yellow":"white";
        ctx.fillText(char, canvas.width/2, 200+i*60);
      });

      ctx.fillText("Press LEFT/RIGHT to select, ENTER to start", canvas.width/2, canvas.height-100);
    }

    // ----- Player -----
    let player = { x: canvas.width/2, y: canvas.height/2, size: 20, speed: 5, health: 3, coins:0 };

    // ----- Controls -----
    let keys = {};
    document.addEventListener("keydown", e => {
      keys[e.key] = true;

      if(gameState==="menu"){
        if(e.key==="ArrowLeft") selectedCharacter = (selectedCharacter-1+characters.length)%characters.length;
        if(e.key==="ArrowRight") selectedCharacter = (selectedCharacter+1)%characters.length;
        if(e.key==="Enter") startGame();
      }
    });
    document.addEventListener("keyup", e => keys[e.key] = false);

    function startGame(){
      gameState="playing";
      player.x = canvas.width/2;
      player.y = canvas.height/2;
      player.health = 3;
      player.coins = 0;
      waveNumber=1;
      titans=[];
      spawnWave(waveNumber);
    }

    // ----- Titans -----
    let titans = [];
    let waveNumber = 1;

    function spawnWave(wave){
      for(let i=0;i<wave+4;i++){ // increase titans per wave
        titans.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height,
          width: 80,
          height: 120,
          speed: 1 + Math.random(),
          health: 2
        });
      }
    }

    // ----- Attacks -----
    let attacking = false;
    let attackTimer = 0;

    document.addEventListener("keydown", e=>{
      if(gameState==="playing" && e.key===" "){
        attacking = true;
        attackTimer = 10;
      }
    });

    function checkAttacks(){
      titans.forEach((t)=>{
        let neckX = t.x + t.width/2;
        let neckY = t.y + 20;
        let dx = player.x - neckX;
        let dy = player.y - neckY;
        let dist = Math.sqrt(dx*dx+dy*dy);

        if(attacking && dist < 30){
          t.health--;
          if(t.health<=0){
            titans.splice(titans.indexOf(t),1);
            player.coins += 1;
          }
        }
      });
    }

    // ----- Update -----
    function update(){
      // Player movement
      if(keys["w"]) player.y -= player.speed;
      if(keys["s"]) player.y += player.speed;
      if(keys["a"]) player.x -= player.speed;
      if(keys["d"]) player.x += player.speed;

      // Titans move
      titans.forEach((t)=>{
        let dx = player.x - t.x;
        let dy = player.y - t.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        t.x += (dx/dist)*t.speed;
        t.y += (dy/dist)*t.speed;

        // Collision with player
        if(Math.abs(player.x - t.x) < t.width/2 + player.size/2 &&
           Math.abs(player.y - t.y) < t.height/2 + player.size/2){
          player.health--;
          t.x = Math.random()*canvas.width;
          t.y = Math.random()*canvas.height;
          if(player.health<=0) gameState="gameover";
        }
      });

      if(attacking){
        attackTimer--;
        if(attackTimer<=0) attacking=false;
      }

      checkAttacks();

      // Wave complete
      if(titans.length===0){
        waveNumber++;
        spawnWave(waveNumber);
      }
    }

    // ----- Draw -----
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Player
      ctx.fillStyle = "black";
      ctx.fillRect(player.x, player.y, player.size, player.size);

      // Titans
      titans.forEach((t)=>{
        ctx.fillStyle="red";
        ctx.fillRect(t.x, t.y, t.width, t.height);
        ctx.fillStyle="yellow";
        ctx.fillRect(t.x + t.width/2 -5, t.y+20, 10, 10);
      });

      // Slash effect
      if(attacking){
        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.arc(player.x + player.size/2, player.y + player.size/2, 40,0,Math.PI*2);
        ctx.stroke();
      }

      // Player Health
      ctx.fillStyle="green";
      for(let i=0;i<player.health;i++){
        ctx.fillRect(20+i*25,20,20,20);
      }

      // Coins and Wave
      ctx.fillStyle="gold";
      ctx.fillText("Coins: "+player.coins, 20, 70);
      ctx.fillStyle="white";
      ctx.fillText("Wave: "+waveNumber, 20, 100);
    }

    // ----- Game Over -----
    function drawGameOver(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="black";
      ctx.font="50px 'Press Start 2P'";
      ctx.textAlign="center";
      ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2-50);
      ctx.font="30px 'Press Start 2P'";
      ctx.fillText("Coins Collected: "+player.coins, canvas.width/2, canvas.height/2+20);
      ctx.fillText("Press ENTER to Restart", canvas.width/2, canvas.height/2+70);
    }

    // Restart listener
    document.addEventListener("keydown", e=>{
      if(gameState==="gameover" && e.key==="Enter") startGame();
    });

    // ----- Main loop -----
    function gameLoop(){
      if(gameState==="loading") drawLoading();
      else if(gameState==="menu") drawMenu();
      else if(gameState==="playing"){ update(); draw(); }
      else if(gameState==="gameover") drawGameOver();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
