<!DOCTYPE html>
<html>
<head>
  <title>AOT Survival</title>
  <style>
    body { margin:0; overflow:hidden; background:#1e1e2f; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------- IMAGE ----------
let sprite = new Image();
let loaded = false;

sprite.onload = () => loaded = true;
sprite.src = "./sprites.png";

// ---------- SETTINGS ----------
const CHAR_SIZE = 64;

// ---------- CHARACTERS ----------
let characters = [
 {name:"Eren",speed:5,health:3},
 {name:"Mikasa",speed:8,health:2},
 {name:"Armin",speed:4,health:3},
 {name:"Levi",speed:7,health:2},
 {name:"Reiner",speed:3,health:5},
 {name:"Annie",speed:5,health:3}
];

let selectedCharacter = 0;

// ---------- STATE ----------
let gameState = "loading";

// ---------- LOADING ----------
function drawLoading(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.textAlign="center";
  ctx.fillText("LOADING...", canvas.width/2, canvas.height/2);

  if(loaded) gameState = "menu";
}

// ---------- MENU ----------
function drawMenu(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let startX = canvas.width/2 - (characters.length * 100)/2;

  characters.forEach((c,i)=>{
    let x = startX + i*100;
    let y = canvas.height/2;

    let sx = i * CHAR_SIZE;

    ctx.drawImage(sprite, sx, 0, CHAR_SIZE, CHAR_SIZE, x-32, y-32, 64, 64);

    if(i === selectedCharacter){
      ctx.strokeStyle="yellow";
      ctx.lineWidth=3;
      ctx.strokeRect(x-40,y-40,80,80);
    }

    ctx.fillStyle="white";
    ctx.fillText(c.name,x,y+60);
  });
}

// ---------- PLAYER ----------
let player;

function startGame(){
  let c = characters[selectedCharacter];

  player = {
    x:canvas.width/2,
    y:canvas.height/2,
    speed:c.speed,
    health:c.health,
    index:selectedCharacter
  };

  titans=[];
  wave=1;
  spawnWave();

  gameState="playing";
}

// ---------- CONTROLS ----------
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(gameState==="menu"){
    if(e.key==="ArrowLeft") selectedCharacter--;
    if(e.key==="ArrowRight") selectedCharacter++;

    if(selectedCharacter<0) selectedCharacter=characters.length-1;
    if(selectedCharacter>=characters.length) selectedCharacter=0;

    if(e.key==="Enter") startGame();
  }

  if(gameState==="gameover" && e.key==="Enter"){
    gameState="menu";
  }
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// ---------- TITANS ----------
let titans=[];
let wave=1;

function spawnWave(){
  for(let i=0;i<wave+3;i++){
    titans.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:1+Math.random()
    });
  }
}

// ---------- UPDATE ----------
function update(){
  if(keys["w"]) player.y-=player.speed;
  if(keys["s"]) player.y+=player.speed;
  if(keys["a"]) player.x-=player.speed;
  if(keys["d"]) player.x+=player.speed;

  titans.forEach((t,i)=>{
    let dx=player.x-t.x;
    let dy=player.y-t.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;

    if(dist < 40){
      player.health--;
      titans.splice(i,1);

      if(player.health<=0){
        gameState="gameover";
      }
    }
  });

  if(titans.length===0){
    wave++;
    spawnWave();
  }
}

// ---------- DRAW PLAYER ----------
function drawPlayer(){
  let sx = player.index * CHAR_SIZE;

  ctx.drawImage(sprite, sx, 0, CHAR_SIZE, CHAR_SIZE, player.x, player.y, 64, 64);
}

// ---------- DRAW ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();

  // 🔥 TITANS DRAWING FIXED
  titans.forEach(t=>{
    ctx.fillStyle="red";
    ctx.fillRect(t.x,t.y,40,60);
  });

  ctx.fillStyle="white";
  ctx.fillText("HP: "+player.health,20,20);
}

// ---------- GAME OVER ----------
function drawGameOver(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.font="40px Arial";
  ctx.textAlign="center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
}

// ---------- LOOP ----------
function gameLoop(){
  if(gameState==="loading") drawLoading();
  else if(gameState==="menu") drawMenu();
  else if(gameState==="playing"){ update(); draw(); }
  else if(gameState==="gameover") drawGameOver();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
