<!DOCTYPE html>
<html>
<head>
  <title>AOT Survival</title>
  <style>
    body { margin:0; overflow:hidden; background:#1e1e2f; }
    canvas { display:block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------- IMAGE ----------
let sprite = new Image();
let loaded = false;

sprite.onload = () => {
  console.log("IMAGE LOADED");
  loaded = true;
};

sprite.onerror = () => {
  console.log("FAILED TO LOAD IMAGE");
};

// 🔴 CHANGE NAME IF NEEDED
sprite.src = "./sprites.png";

// ---------- STATE ----------
let gameState = "loading";

// ---------- LOADING ----------
function drawLoading(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.textAlign="center";
  ctx.fillText("LOADING...", canvas.width/2, canvas.height/2);

  if(loaded){
    gameState = "menu";
  }
}

// ---------- MENU ----------
function drawMenu(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.textAlign="center";
  ctx.fillText("IF YOU SEE THE IMAGE BELOW → IT WORKS", canvas.width/2, 100);

  // ✅ FORCE DRAW IMAGE
  if(loaded){
    ctx.drawImage(sprite, canvas.width/2 - 128, canvas.height/2 - 128, 256, 256);
  } else {
    ctx.fillStyle="red";
    ctx.fillRect(canvas.width/2 - 50, canvas.height/2 - 50, 100, 100);
  }
}

// ---------- LOOP ----------
function gameLoop(){
  if(gameState==="loading") drawLoading();
  else if(gameState==="menu") drawMenu();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
