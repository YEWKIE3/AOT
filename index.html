<!DOCTYPE html>
<html>
<head>
  <title>Titan Survival</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      background: #1e1e2f;
      font-family: 'Press Start 2P', monospace;
    }

    canvas {
      display: block;
      background: linear-gradient(#87CEEB, #cce7ff);
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- STATE ----------------
let gameState = "loading"; // loading, menu, playing, gameover

// ---------------- LOADING ----------------
let loadingTimer = 0;

function drawLoading(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "50px 'Press Start 2P'";
  ctx.fillText("LOADING...", canvas.width/2, canvas.height/2 - 40);

  // Progress bar
  let progress = loadingTimer / 120;
  ctx.fillStyle = "gray";
  ctx.fillRect(canvas.width/2 - 150, canvas.height/2, 300, 20);

  ctx.fillStyle = "lime";
  ctx.fillRect(canvas.width/2 - 150, canvas.height/2, 300 * progress, 20);

  loadingTimer++;
  if(loadingTimer > 120){
    gameState = "menu";
  }
}

// ---------------- MENU ----------------
let selectedCharacter = 0;
let characters = ["Scout A","Scout B","Scout C","Scout D"];

function drawMenu(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "40px 'Press Start 2P'";
  ctx.fillText("SELECT CHARACTER", canvas.width/2, 100);

  let startX = canvas.width/2 - (characters.length * 140)/2;

  characters.forEach((char,i)=>{
    let x = startX + i * 140;
    let y = canvas.height/2;

    ctx.fillStyle = i === selectedCharacter ? "yellow" : "white";
    ctx.fillRect(x-50, y-50, 100, 100);

    ctx.fillStyle = "black";
    ctx.font = "12px 'Press Start 2P'";
    ctx.fillText(char, x, y+80);
  });

  ctx.fillStyle = "white";
  ctx.font = "15px 'Press Start 2P'";
  ctx.fillText("ARROWS TO SELECT • ENTER TO START", canvas.width/2, canvas.height - 80);
}

// ---------------- PLAYER ----------------
let player;
function createPlayer(){
  return {
    x: canvas.width/2,
    y: canvas.height/2,
    width: 30,
    height: 30,
    speed: 5,
    health: 3,
    coins: 0
  };
}

// ---------------- TITANS ----------------
let titans = [];
let wave = 1;

function spawnWave(){
  for(let i=0;i<wave+3;i++){
    titans.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      width: 60,
      height: 100,
      speed: 1 + Math.random(),
      health: 2
    });
  }
}

// ---------------- CONTROLS ----------------
let keys = {};
document.addEventListener("keydown", e=>{
  keys[e.key] = true;

  if(gameState === "menu"){
    if(e.key === "ArrowLeft") selectedCharacter = (selectedCharacter - 1 + characters.length) % characters.length;
    if(e.key === "ArrowRight") selectedCharacter = (selectedCharacter + 1) % characters.length;
    if(e.key === "Enter") startGame();
  }

  if(gameState === "gameover" && e.key === "Enter"){
    startGame();
  }

  if(gameState === "playing" && e.key === " "){
    attacking = true;
    attackTimer = 10;
  }
});

document.addEventListener("keyup", e=> keys[e.key] = false);

// ---------------- COLLISION ----------------
function rectCollision(a,b){
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function circleCollision(x1,y1,r1,x2,y2,r2){
  let dx = x1 - x2;
  let dy = y1 - y2;
  return Math.sqrt(dx*dx + dy*dy) < r1 + r2;
}

// ---------------- ATTACK ----------------
let attacking = false;
let attackTimer = 0;

function handleAttack(){
  titans.forEach((t,i)=>{
    let neckX = t.x + t.width/2;
    let neckY = t.y + 20;

    if(circleCollision(
      player.x + player.width/2,
      player.y + player.height/2,
      40,
      neckX,
      neckY,
      15
    )){
      t.health--;

      if(t.health <= 0){
        titans.splice(i,1);
        player.coins++;
      }
    }
  });
}

// ---------------- UPDATE ----------------
function update(){
  // Movement
  if(keys["w"]) player.y -= player.speed;
  if(keys["s"]) player.y += player.speed;
  if(keys["a"]) player.x -= player.speed;
  if(keys["d"]) player.x += player.speed;

  // Titans
  titans.forEach(t=>{
    let dx = player.x - t.x;
    let dy = player.y - t.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;

    if(rectCollision(player,t)){
      player.health--;
      t.x = Math.random()*canvas.width;
      t.y = Math.random()*canvas.height;

      if(player.health <= 0){
        gameState = "gameover";
      }
    }
  });

  if(attacking){
    attackTimer--;
    handleAttack();
    if(attackTimer <= 0) attacking = false;
  }

  if(titans.length === 0){
    wave++;
    spawnWave();
  }
}

// ---------------- DRAW ----------------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Player
  ctx.fillStyle = "black";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Titans
  titans.forEach(t=>{
    ctx.fillStyle = "red";
    ctx.fillRect(t.x, t.y, t.width, t.height);

    // weak spot
    ctx.fillStyle = "yellow";
    ctx.fillRect(t.x + t.width/2 - 5, t.y + 20, 10, 10);
  });

  // Slash effect
  if(attacking){
    ctx.strokeStyle = "white";
    ctx.beginPath();
    ctx.arc(player.x + player.width/2, player.y + player.height/2, 40, 0, Math.PI*2);
    ctx.stroke();
  }

  // HUD
  ctx.fillStyle = "green";
  for(let i=0;i<player.health;i++){
    ctx.fillRect(20 + i*25, 20, 20, 20);
  }

  ctx.fillStyle = "gold";
  ctx.fillText("Coins: " + player.coins, 20, 70);

  ctx.fillStyle = "white";
  ctx.fillText("Wave: " + wave, 20, 100);
}

// ---------------- GAME OVER ----------------
function drawGameOver(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "red";
  ctx.font = "50px 'Press Start 2P'";
  ctx.textAlign = "center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 40);

  ctx.font = "20px 'Press Start 2P'";
  ctx.fillText("Coins: " + player.coins, canvas.width/2, canvas.height/2 + 20);
  ctx.fillText("Press ENTER to restart", canvas.width/2, canvas.height/2 + 60);
}

// ---------------- START ----------------
function startGame(){
  player = createPlayer();
  titans = [];
  wave = 1;
  spawnWave();
  gameState = "playing";
}

// ---------------- LOOP ----------------
function gameLoop(){
  if(gameState === "loading") drawLoading();
  else if(gameState === "menu") drawMenu();
  else if(gameState === "playing"){ update(); draw(); }
  else if(gameState === "gameover") drawGameOver();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
