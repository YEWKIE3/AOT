<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------- IMAGE ----------
let sprite = new Image();
let loaded = false;
sprite.onload = () => loaded = true;
sprite.src = "./sprites.png";

// ---------- GRID ----------
const COLS = 3;
const ROWS = 2;
let frameWidth, frameHeight;

// ---------- CHARACTERS ----------
let characters = ["Eren","Mikasa","Armin","Levi","Reiner","Annie"];
let selectedCharacter = 0;

// ---------- STATE ----------
let gameState = "loading";

// ---------- PLAYER ----------
let player;

// ---------- TITANS ----------
let titans=[];

// ---------- CONTROLS ----------
let keys={};

document.addEventListener("keydown",e=>{
  keys[e.key]=true;

  if(gameState==="menu"){
    if(e.key==="ArrowLeft") selectedCharacter--;
    if(e.key==="ArrowRight") selectedCharacter++;

    if(selectedCharacter<0) selectedCharacter=characters.length-1;
    if(selectedCharacter>=characters.length) selectedCharacter=0;

    if(e.key==="Enter") startGame();
  }

  if(gameState==="playing" && e.key===" "){
    player.attacking = true;
    player.attackTimer = 10;
  }

  if(gameState==="gameover" && e.key==="Enter"){
    gameState="menu";
  }
});

document.addEventListener("keyup",e=>keys[e.key]=false);

// ---------- START ----------
function startGame(){
  player = {
    x:canvas.width/2,
    y:canvas.height/2,
    health:3,
    index:selectedCharacter,
    facing:1,
    frame:0,
    frameTick:0,
    attacking:false,
    attackTimer:0
  };

  titans=[];
  spawnWave();
  gameState="playing";
}

// ---------- SPAWN ----------
function spawnWave(){
  for(let i=0;i<5;i++){
    titans.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:1+Math.random()
    });
  }
}

// ---------- UPDATE ----------
function update(){
  let moving = false;

  if(keys["w"]){ player.y-=5; moving=true; }
  if(keys["s"]){ player.y+=5; moving=true; }
  if(keys["a"]){ player.x-=5; player.facing=-1; moving=true; }
  if(keys["d"]){ player.x+=5; player.facing=1; moving=true; }

  // walking animation
  if(moving){
    player.frameTick++;
    if(player.frameTick > 8){
      player.frame = (player.frame+1)%2;
      player.frameTick = 0;
    }
  } else {
    player.frame = 0;
  }

  // attack logic
  if(player.attacking){
    player.attackTimer--;

    titans.forEach((t,i)=>{
      let dx=player.x-t.x;
      let dy=player.y-t.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist < 80){
        titans.splice(i,1);
      }
    });

    if(player.attackTimer <= 0){
      player.attacking = false;
    }
  }

  // titan movement
  titans.forEach((t,i)=>{
    let dx=player.x-t.x;
    let dy=player.y-t.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;

    if(dist < 40){
      player.health--;
      titans.splice(i,1);

      if(player.health<=0){
        gameState="gameover";
      }
    }
  });

  if(titans.length===0) spawnWave();
}

// ---------- SPRITE POS ----------
function getSpritePos(index){
  let col = index % COLS;
  let row = Math.floor(index / COLS);
  return {
    sx: col * frameWidth,
    sy: row * frameHeight
  };
}

// ---------- DRAW PLAYER ----------
function drawPlayer(){
  let pos = getSpritePos(player.index);

  ctx.save();

  // flip
  if(player.facing === -1){
    ctx.scale(-1,1);
    ctx.drawImage(
      sprite,
      pos.sx, pos.sy,
      frameWidth, frameHeight,
      -player.x-64, player.y + player.frame*2, // bounce
      64, 64
    );
  } else {
    ctx.drawImage(
      sprite,
      pos.sx, pos.sy,
      frameWidth, frameHeight,
      player.x, player.y + player.frame*2,
      64, 64
    );
  }

  ctx.restore();

  // 🔥 blade swing animation
  if(player.attacking){
    ctx.save();
    ctx.translate(player.x+32, player.y+32);

    let angle = (10 - player.attackTimer) * 0.3 * player.facing;
    ctx.rotate(angle);

    ctx.fillStyle="white";
    ctx.fillRect(0, -5, 50, 10);

    ctx.restore();
  }
}

// ---------- MENU ----------
function drawMenu(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let startX = canvas.width/2 - (characters.length * 100)/2;

  characters.forEach((name,i)=>{
    let x = startX + i*100;
    let y = canvas.height/2;

    let pos = getSpritePos(i);

    ctx.drawImage(
      sprite,
      pos.sx, pos.sy,
      frameWidth, frameHeight,
      x-32, y-32,
      64, 64
    );

    if(i === selectedCharacter){
      ctx.strokeStyle="yellow";
      ctx.lineWidth=3;
      ctx.strokeRect(x-40,y-40,80,80);
    }

    ctx.fillStyle="white";
    ctx.fillText(name,x,y+60);
  });
}

// ---------- DRAW ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();

  titans.forEach(t=>{
    ctx.fillStyle="red";
    ctx.fillRect(t.x,t.y,40,60);
  });

  ctx.fillStyle="white";
  ctx.fillText("HP: "+player.health,20,20);
}

// ---------- GAME OVER ----------
function drawGameOver(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.font="40px Arial";
  ctx.textAlign="center";
  ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
}

// ---------- LOOP ----------
function gameLoop(){
  if(gameState==="loading"){
    if(loaded){
      frameWidth = sprite.width / COLS;
      frameHeight = sprite.height / ROWS;
      gameState="menu";
    }
  }
  else if(gameState==="menu") drawMenu();
  else if(gameState==="playing"){ update(); draw(); }
  else if(gameState==="gameover") drawGameOver();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
