<!DOCTYPE html>
<html>
<head>
  <title>Titan Breaker</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; background: skyblue; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    // ----- Canvas setup -----
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // ----- Player -----
    let player = {
      x: 100,
      y: 100,
      size: 20,
      speed: 5
    };

    let keys = {};
    document.addEventListener("keydown", e => keys[e.key] = true);
    document.addEventListener("keyup", e => keys[e.key] = false);

    // ----- Grappling hook -----
    let hook = { active: false, x: 0, y: 0 };
    canvas.addEventListener("click", (e) => {
      hook.x = e.clientX;
      hook.y = e.clientY;
      hook.active = true;
    });

    // ----- Titan -----
    let titan = {
      x: 500,
      y: 200,
      width: 80,
      height: 120,
      speed: 1.2,
      alive: true
    };

    function updateTitan() {
      if (!titan.alive) return;

      let dx = player.x - titan.x;
      let dy = player.y - titan.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      titan.x += (dx / dist) * titan.speed;
      titan.y += (dy / dist) * titan.speed;
    }

    // ----- Attack -----
    let attacking = false;
    let attackTimer = 0;

    document.addEventListener("keydown", e => {
      if (e.key === " ") {  // SPACE = attack
        attacking = true;
        attackTimer = 10;
        checkAttack();
      }
    });

    function checkAttack() {
      if (!titan.alive) return;

      let neckX = titan.x + titan.width/2;
      let neckY = titan.y + 20;

      let dx = player.x - neckX;
      let dy = player.y - neckY;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 30) titan.alive = false;
    }

    // ----- Update -----
    function update() {
      // Player movement
      if (keys["w"]) player.y -= player.speed;
      if (keys["s"]) player.y += player.speed;
      if (keys["a"]) player.x -= player.speed;
      if (keys["d"]) player.x += player.speed;

      // Grapple movement
      if (hook.active) {
        let dx = hook.x - player.x;
        let dy = hook.y - player.y;
        player.x += dx * 0.05;
        player.y += dy * 0.05;
      }

      // Titan movement
      updateTitan();
    }

    // ----- Draw -----
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grapple line
      if (hook.active) {
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(hook.x, hook.y);
        ctx.stroke();
      }

      // Player
      ctx.fillStyle = "black";
      ctx.fillRect(player.x, player.y, player.size, player.size);

      // Titan
      if (titan.alive) {
        ctx.fillStyle = "red";
        ctx.fillRect(titan.x, titan.y, titan.width, titan.height);

        // Weak spot (neck)
        ctx.fillStyle = "yellow";
        ctx.fillRect(titan.x + titan.width/2 - 5, titan.y + 20, 10, 10);
      }

      // Slash effect
      if (attacking) {
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.arc(player.x + player.size/2, player.y + player.size/2, 40, 0, Math.PI*2);
        ctx.stroke();

        attackTimer--;
        if (attackTimer <= 0) attacking = false;
      }
    }

    // ----- Game loop -----
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
