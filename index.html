<!DOCTYPE html>
<html>
<head>
  <title>AOT Ultimate Survival Pro</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; background:#111; }
    #ui {
      position:absolute; top:10px; left:10px; color:white;
      font-family:sans-serif; font-size:20px; z-index:10;
    }
  </style>
</head>
<body>

<div id="ui">HP: 3 | Score: 0 | Wave: 1 | Power: None</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Sprites ---
const sprite = new Image();
sprite.src = "./sprites.png"; // pixel-art sheet
let spriteReady = false;
const frameWidth = 64, frameHeight = 64;
sprite.onload = ()=> spriteReady=true;

// --- Game State ---
let gameState = "loading";
let characters = ["Eren","Mikasa","Armin","Levi","Reiner","Annie"];
let selectedCharacter = 0;
let player = null;
let titans = [];
let keys = {};
let score=0, wave=1, powerUp=null;
let shake=0;

// --- Input ---
document.addEventListener("keydown", e=>{
  keys[e.key]=true;
  if(gameState==="menu"){
    if(e.key==="ArrowLeft") selectedCharacter=(selectedCharacter-1+characters.length)%characters.length;
    if(e.key==="ArrowRight") selectedCharacter=(selectedCharacter+1)%characters.length;
    if(e.key==="Enter") startGame();
  }
  if(gameState==="playing"){
    if(e.key===" ") attack();
    if(e.key==="Shift") dash();
  }
  if(gameState==="gameover" && e.key==="Enter"){ gameState="menu"; score=0; wave=1; }
});
document.addEventListener("keyup", e=> keys[e.key]=false);

// --- Player ---
function startGame(){
  player={
    x:canvas.width/2, y:canvas.height/2,
    health:3, index:selectedCharacter,
    attacking:false, attackTimer:0, combo:0,
    dashing:false, dashTimer:0,
    animFrame:0, animTimer:0,
    power:null, powerTimer:0
  };
  titans=[];
  spawnWave();
  gameState="playing";
}

function attack(){
  if(player&&!player.attacking){
    player.attacking=true;
    player.attackTimer=12;
    player.combo=(player.combo+1)%3;
  }
}
function dash(){
  if(player&&!player.dashing){
    player.dashing=true;
    player.dashTimer=12;
  }
}

// --- Titans ---
function spawnWave(){
  wave++;
  for(let i=0;i<3+wave;i++){
    const size=Math.random()*40+30;
    titans.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:1+Math.random()*wave*0.3,
      size:size, animFrame:0, animTimer:0,
      boss: wave%5===0 && i===0 // first titan every 5 waves is boss
    });
  }
}

// --- Update ---
function update(){
  if(!player) return;

  // Movement
  const speed = player.dashing?10:5;
  if(keys["w"]) player.y-=speed;
  if(keys["s"]) player.y+=speed;
  if(keys["a"]) player.x-=speed;
  if(keys["d"]) player.x+=speed;

  // Dash
  if(player.dashing){ player.dashTimer--; if(player.dashTimer<=0) player.dashing=false; }

  // Attack
  if(player.attacking){
    player.attackTimer--;
    titans.forEach((t,i)=>{
      const dx=player.x-t.x, dy=player.y-t.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<t.size+40){ titans.splice(i,1); score+= t.boss?50:10; screenShake(); spawnPowerUp(t.x,t.y); }
    });
    if(player.attackTimer<=0) player.attacking=false;
  }

  // Titan AI
  titans.forEach(t=>{
    const dx=player.x-t.x, dy=player.y-t.y, dist=Math.sqrt(dx*dx+dy*dy);
    t.x += (dx/dist)*t.speed;
    t.y += (dy/dist)*t.speed;
    if(dist<t.size+20){ player.health--; titans.splice(titans.indexOf(t),1); screenShake(); if(player.health<=0) gameState="gameover"; }
  });

  // Animations
  player.animTimer++; if(player.animTimer>5){ player.animFrame=(player.animFrame+1)%4; player.animTimer=0; }
  titans.forEach(t=>{ t.animTimer++; if(t.animTimer>10){ t.animFrame=(t.animFrame+1)%2; t.animTimer=0; } });

  // Power-up timer
  if(player.power){ player.powerTimer--; if(player.powerTimer<=0) player.power=null; }

  // Spawn new wave
  if(titans.length===0) spawnWave();

  updateUI();
}

// --- Power-ups ---
let powerUps=[];
function spawnPowerUp(x,y){
  const types=["Health","Speed","Attack"];
  const p={x,y,type:types[Math.floor(Math.random()*types.length)],timer:600};
  powerUps.push(p);
}
function checkPowerUps(){
  powerUps.forEach((p,i)=>{
    const dx=p.x-player.x, dy=p.y-player.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<40){
      player.power=p.type; player.powerTimer=600;
      if(p.type==="Health") player.health=Math.min(player.health+1,5);
      else if(p.type==="Speed"){} // affects speed dynamically
      else if(p.type==="Attack"){} // affects attack logic
      powerUps.splice(i,1);
    }
    p.timer--; if(p.timer<=0) powerUps.splice(i,1);
  });
}

// --- UI ---
function updateUI(){
  document.getElementById("ui").innerText=`HP: ${player.health} | Score: ${score} | Wave: ${wave} | Power: ${player.power||"None"}`;
}

// --- Effects ---
function screenShake(){ shake=8; }

// --- Draw ---
function draw(){
  ctx.save();
  if(shake){ ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake--; }

  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Power-ups
  powerUps.forEach(p=>{
    ctx.fillStyle=p.type==="Health"?"green":p.type==="Speed"?"blue":"orange";
    ctx.fillRect(p.x-10,p.y-10,20,20);
  });

  // Draw titans
  titans.forEach(t=>{
    ctx.fillStyle=t.boss?"darkred":"red";
    ctx.beginPath();
    ctx.ellipse(t.x,t.y,t.size/2,t.size,0,0,Math.PI*2);
    ctx.fill();
  });

  // Draw player
  if(spriteReady){
    const fx=player.animFrame*frameWidth;
    const fy=player.index*frameHeight;
    ctx.drawImage(sprite, fx, fy, frameWidth, frameHeight, player.x-32, player.y-32, 64, 64);
  }

  // Attack trail
  if(player.attacking){
    ctx.save();
    ctx.translate(player.x,player.y);
    ctx.rotate(Math.random()*0.6-0.3);
    ctx.fillStyle="cyan"; ctx.globalAlpha=0.5;
    ctx.fillRect(0,-6,70,12);
    ctx.globalAlpha=1; ctx.restore();
  }

  // Dash effect
  if(player.dashing){
    ctx.strokeStyle="white";
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(player.x,player.y);
      ctx.lineTo(player.x+Math.random()*100-50,player.y+Math.random()*100-50);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// --- Menu ---
function drawMenu(){
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white"; ctx.textAlign="center"; ctx.font="40px sans-serif";
  ctx.fillText("SELECT CHARACTER", canvas.width/2,100);
  const startX=canvas.width/2-(characters.length*100)/2;
  characters.forEach((c,i)=>{
    const x=startX+i*100, y=canvas.height/2;
    if(spriteReady) ctx.drawImage(sprite,0,i*frameHeight,frameWidth,frameHeight,x-32,y-32,64,64);
    if(i===selectedCharacter){ ctx.strokeStyle="yellow"; ctx.strokeRect(x-40,y-40,80,80); }
    ctx.fillStyle="white"; ctx.fillText(c,x,y+60);
  });
}

// --- Game Over ---
function drawGameOver(){
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="red"; ctx.textAlign="center"; ctx.font="60px sans-serif";
  ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2);
}

// --- Loop ---
function loop(){
  if(gameState==="loading"){
    ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white"; ctx.textAlign="center"; ctx.font="40px sans-serif";
    ctx.fillText("LOADING...",canvas.width/2,canvas.height/2);
  } else if(gameState==="menu") drawMenu();
  else if(gameState==="playing"){ update(); checkPowerUps(); draw(); }
  else if(gameState==="gameover") drawGameOver();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
